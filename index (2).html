<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My AI Assistant</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a; color: #e8e8f0;
      height: 100vh; display: flex; overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: 240px; min-width: 240px; background: #0a0a15;
      display: flex; flex-direction: column; border-right: 1px solid #1a1a2e;
    }
    #sidebar-top { padding: 12px 10px; border-bottom: 1px solid #1a1a2e; }
    #new-chat-btn {
      width: 100%; padding: 10px 14px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none; border-radius: 10px; color: white;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    #new-chat-btn:hover { opacity: 0.88; }
    #conv-list { flex: 1; overflow-y: auto; padding: 8px; }
    #conv-list::-webkit-scrollbar { width: 3px; }
    #conv-list::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 2px; }
    .sec-lbl {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.07em; color: #333355; padding: 10px 8px 4px;
    }
    .conv-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      margin-bottom: 2px; transition: background 0.12s;
    }
    .conv-item:hover  { background: #1a1a30; }
    .conv-item.active { background: #222244; }
    .conv-ttl {
      flex: 1; font-size: 13px; color: #8888b8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-item.active .conv-ttl { color: #e8e8f0; }
    .conv-del {
      display: none; background: none; border: none;
      color: #444465; cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 4px;
    }
    .conv-item:hover .conv-del { display: block; }
    .conv-del:hover { color: #ef4444; }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #header {
      padding: 13px 20px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #header .ava {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    #header h1 { font-size: 16px; font-weight: 600; color: white; }
    #header p  { font-size: 12px; color: rgba(255,255,255,0.7); }

    /* MESSAGES */
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 3px; }

    #welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 40px; color: #4a4a6a;
    }
    #welcome .wi { font-size: 54px; margin-bottom: 14px; }
    #welcome h2  { font-size: 20px; color: #7070c0; margin-bottom: 10px; }
    #welcome p   { font-size: 15px; line-height: 1.7; max-width: 380px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
    .chip {
      padding: 7px 13px; background: #1e1e38; border: 1px solid #2e2e50;
      border-radius: 20px; font-size: 13px; color: #8080b0;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .chip:hover { background: #2e2e50; color: #e8e8f0; }

    .msg { display: flex; gap: 10px; max-width: 84%; animation: pop 0.2s ease; }
    .msg.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .m-ava {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 3px;
    }
    .msg.user .m-ava      { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
    .msg.assistant .m-ava { background: linear-gradient(135deg,#10b981,#059669); }
    .m-body { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }
    .m-img {
      max-width: 280px; max-height: 280px;
      border-radius: 12px; object-fit: cover; display: block;
    }
    .m-text {
      padding: 11px 15px; border-radius: 18px;
      font-size: 15px; line-height: 1.68; word-wrap: break-word;
    }
    .msg.user .m-text {
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      color: white; border-bottom-right-radius: 5px;
    }
    .msg.assistant .m-text {
      background: #1e1e38; color: #e0e0f0; border-bottom-left-radius: 5px;
    }
    .m-text.err {
      background: rgba(239,68,68,0.1) !important;
      border-left: 3px solid #ef4444; color: #fca5a5 !important;
    }
    .m-text pre {
      background: #0d0d1a; padding: 12px; border-radius: 8px;
      overflow-x: auto; margin: 8px 0; font-size: 13px; border-left: 3px solid #6366f1;
    }
    .m-text code {
      background: rgba(99,102,241,0.18); padding: 2px 5px;
      border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace;
    }
    .m-text pre code { background: none; padding: 0; }

    /* LOADING DOTS */
    #loading {
      display: none; align-self: flex-start;
      flex-direction: row; gap: 10px; align-items: center;
    }
    #loading-inner {
      background: #1e1e38; padding: 12px 16px;
      border-radius: 18px; border-bottom-left-radius: 5px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; background: #6366f1;
      border-radius: 50%; animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* INPUT */
    #input-area {
      padding: 10px 18px 16px; background: #0f0f1e;
      border-top: 1px solid #1a1a2e; flex-shrink: 0;
    }
    #img-preview-wrap {
      display: none; margin-bottom: 8px; position: relative; width: fit-content;
    }
    #img-preview { max-height: 100px; max-width: 200px; border-radius: 10px; display: block; }
    #img-remove {
      position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
      background: #ef4444; border: none; border-radius: 50%; color: white;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #form { display: flex; gap: 8px; align-items: flex-end; }
    #upload-btn {
      width: 46px; height: 46px; background: #1e1e38; border: 2px solid #2e2e50;
      border-radius: 14px; color: #6666aa; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, color 0.15s;
    }
    #upload-btn:hover { background: #2e2e50; color: #a0a0d0; }
    #text-input {
      flex: 1; background: #1e1e38; border: 2px solid #2e2e50; border-radius: 14px;
      padding: 11px 15px; color: #e8e8f0; font-size: 15px; font-family: inherit;
      resize: none; min-height: 46px; max-height: 140px;
      line-height: 1.5; overflow-y: auto; transition: border-color 0.2s;
    }
    #text-input:focus { outline: none; border-color: #6366f1; }
    #text-input::placeholder { color: #404060; }
    #send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none; border-radius: 14px; color: white; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.1s, opacity 0.2s;
    }
    #send-btn:hover    { transform: scale(1.06); }
    #send-btn:active   { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #file-input { display: none; }

    @keyframes pop    { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-6px);} }
    @media (max-width: 600px) { #sidebar { display: none; } }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-top">
      <button id="new-chat-btn">＋ New Chat</button>
    </div>
    <div id="conv-list"></div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="header">
      <div class="ava">🤖</div>
      <div>
        <h1>AI Assistant</h1>
        <p>Friendly · Smart · Fun · Powered by Claude</p>
      </div>
    </div>

    <div id="messages">
      <div id="welcome">
        <div class="wi">✨</div>
        <h2>What can I help you with?</h2>
        <p>Ask me anything, upload an image for me to analyze, or just have a chat!</p>
        <div class="chips">
          <div class="chip" onclick="suggest(this)">Explain how AI works</div>
          <div class="chip" onclick="suggest(this)">Write me some code</div>
          <div class="chip" onclick="suggest(this)">Help me with homework</div>
          <div class="chip" onclick="suggest(this)">Tell me something fun</div>
        </div>
      </div>
    </div>

    <div id="loading">
      <div class="m-ava" style="background:linear-gradient(135deg,#10b981,#059669);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🤖</div>
      <div id="loading-inner">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>

    <div id="input-area">
      <div id="img-preview-wrap">
        <img id="img-preview" src="" alt="preview" />
        <button id="img-remove">✕</button>
      </div>
      <form id="form">
        <input type="file" id="file-input" accept="image/*" />
        <button type="button" id="upload-btn" title="Upload an image">🖼</button>
        <textarea id="text-input" placeholder="Message your AI… (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button type="submit" id="send-btn">➤</button>
      </form>
    </div>
  </div>

  <script>
    const SYSTEM = `You are a brilliant AI assistant:
- Friendly & Casual: Talk like a smart friend, not a robot.
- Smart & Professional: Give accurate, well-reasoned answers.
- Fun & Playful: Keep things light and enjoyable.
You can analyze uploaded images, help with coding, answer questions, and discuss any topic.`;

    let pendingImage = null;
    let activeId = null;
    let conversations = [];

    function getActive()  { return conversations.find(c => c.id === activeId) || null; }
    function uid()        { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function updateActive(fn) {
      const i = conversations.findIndex(c => c.id === activeId);
      if (i !== -1) fn(conversations[i]);
    }

    newChat();

    function newChat() {
      const conv = { id: uid(), title: 'New chat', messages: [], ts: Date.now() };
      conversations.unshift(conv);
      activeId = conv.id;
      clearMsgs(); renderSidebar();
    }
    document.getElementById('new-chat-btn').onclick = newChat;

    function loadConv(id) {
      activeId = id; clearMsgs(); renderSidebar();
      const conv = getActive();
      if (conv) conv.messages.forEach(m => renderMsg(m));
    }

    function del(id, e) {
      e.stopPropagation();
      conversations = conversations.filter(c => c.id !== id);
      if (activeId === id) { conversations.length ? loadConv(conversations[0].id) : newChat(); }
      else renderSidebar();
    }

    function renderSidebar() {
      const list = document.getElementById('conv-list');
      list.innerHTML = '';
      if (!conversations.length) {
        list.innerHTML = '<div style="padding:20px;color:#333355;font-size:13px;text-align:center">No chats yet</div>';
        return;
      }
      const tod = new Date(); tod.setHours(0,0,0,0);
      const yes = new Date(tod); yes.setDate(yes.getDate()-1);
      const groups = [['Today',[]],['Yesterday',[]],['Older',[]]];
      conversations.forEach(c => {
        const d = new Date(c.ts);
        if (d >= tod) groups[0][1].push(c);
        else if (d >= yes) groups[1][1].push(c);
        else groups[2][1].push(c);
      });
      groups.forEach(([label, items]) => {
        if (!items.length) return;
        const lbl = document.createElement('div');
        lbl.className = 'sec-lbl'; lbl.textContent = label;
        list.appendChild(lbl);
        items.forEach(conv => {
          const item = document.createElement('div');
          item.className = 'conv-item' + (conv.id === activeId ? ' active' : '');
          item.innerHTML = `<span style="font-size:13px">💬</span><span class="conv-ttl">${esc(conv.title)}</span><button class="conv-del" onclick="del('${conv.id}',event)">✕</button>`;
          item.addEventListener('click', () => loadConv(conv.id));
          list.appendChild(item);
        });
      });
    }

    // ---- File upload ----
    document.getElementById('upload-btn').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').addEventListener('change', function() {
      const file = this.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const [header, base64] = e.target.result.split(',');
        pendingImage = { base64, mediaType: header.match(/:(.*?);/)[1] };
        document.getElementById('img-preview').src = e.target.result;
        document.getElementById('img-preview-wrap').style.display = 'block';
      };
      reader.readAsDataURL(file); this.value = '';
    });
    document.getElementById('img-remove').onclick = () => {
      pendingImage = null;
      document.getElementById('img-preview-wrap').style.display = 'none';
      document.getElementById('img-preview').src = '';
    };

    // ---- Send ----
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const text = document.getElementById('text-input').value.trim();
      if (!text && !pendingImage) return;

      document.getElementById('welcome').style.display = 'none';

      const content = [];
      if (pendingImage) content.push({ type:'image', source:{ type:'base64', media_type:pendingImage.mediaType, data:pendingImage.base64 } });
      if (text) content.push({ type:'text', text });

      updateActive(conv => {
        conv.messages.push({ role:'user', content });
        if (conv.title === 'New chat') {
          const t = text || 'Image';
          conv.title = t.length > 50 ? t.slice(0,50)+'…' : t;
        }
      });

      renderMsg({ role:'user', content });
      renderSidebar();

      document.getElementById('text-input').value = '';
      document.getElementById('text-input').style.height = 'auto';
      pendingImage = null;
      document.getElementById('img-preview-wrap').style.display = 'none';
      document.getElementById('img-preview').src = '';

      setLoading(true);
      try {
        const conv = getActive();
        const reply = await ask(conv.messages);
        updateActive(c => c.messages.push({ role:'assistant', content:[{type:'text',text:reply}] }));
        renderMsg({ role:'assistant', content:[{type:'text',text:reply}] });
      } catch(err) {
        renderMsg({ role:'assistant', content:[{type:'text',text:'😅 '+err.message}], err:true });
      }
      setLoading(false);
    });

    // ---- Claude API ----
    async function ask(messages) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM,
          messages
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
      const block = data.content?.find(b => b.type === 'text');
      if (!block) throw new Error('No response from AI.');
      return block.text;
    }

    // ---- Render ----
    function renderMsg(m) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${m.role}`;
      const content = Array.isArray(m.content) ? m.content : [{type:'text',text:m.content}];
      let bodyHtml = '';
      content.forEach(block => {
        if (block.type === 'image') {
          const src = `data:${block.source.media_type};base64,${block.source.data}`;
          bodyHtml += `<img class="m-img" src="${src}" alt="uploaded image" />`;
        } else if (block.type === 'text' && block.text) {
          bodyHtml += `<div class="m-text ${m.err?'err':''}">${fmt(block.text)}</div>`;
        }
      });
      div.innerHTML = `<div class="m-ava">${m.role==='user'?'🙂':'🤖'}</div><div class="m-body">${bodyHtml}</div>`;
      msgs.appendChild(div); scroll();
    }

    function clearMsgs() {
      document.getElementById('messages').querySelectorAll('.msg').forEach(m => m.remove());
      const conv = getActive();
      document.getElementById('welcome').style.display = (conv && !conv.messages.length) ? 'flex' : 'none';
    }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'flex' : 'none';
      document.getElementById('text-input').disabled = on;
      document.getElementById('send-btn').disabled = on;
      document.getElementById('upload-btn').disabled = on;
      if (!on) document.getElementById('text-input').focus();
      scroll();
    }

    function scroll() { setTimeout(() => { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }, 50); }
    function suggest(el) { document.getElementById('text-input').value = el.textContent; document.getElementById('text-input').focus(); }

    function fmt(text) {
      let s = esc(text);
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,_l,c) => `<pre><code>${c.trim()}</code></pre>`);
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      s = s.replace(/\n/g, '<br>');
      return s;
    }
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('text-input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 140) + 'px';
    });
    document.getElementById('text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('form').dispatchEvent(new Event('submit')); }
    });
  </script>
</body>
</html>
